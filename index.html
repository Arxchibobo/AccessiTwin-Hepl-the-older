<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AccessiTwin - Senior Helper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300&display=swap" rel="stylesheet">
    <style>
      /* Senior Friendly Focus Styles - High visibility but softer */
      :focus-visible {
        outline: 4px solid #6366f1; /* Indigo-500 */
        outline-offset: 4px;
      }
      body {
        /* Default background color */
        background-color: #f8fafc; 
        color: #1c1917; /* Stone-900 */
        font-family: system-ui, -apple-system, sans-serif;
      }
      
      /* Subtle CSS-only Noise for texture without "dirt" */
      .clean-texture {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
        opacity: 0.4;
        background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
        background-size: 24px 24px;
      }

      /* Animations for AI Mascot */
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }
      @keyframes blink {
        0%, 45%, 55%, 100% { transform: scaleY(1); }
        50% { transform: scaleY(0.1); }
      }
      @keyframes pulse-shadow {
        0%, 100% { transform: translateX(-50%) scaleX(1); opacity: 0.2; }
        50% { transform: translateX(-50%) scaleX(0.8); opacity: 0.1; }
      }
      @keyframes wiggle {
        0%, 100% { transform: rotate(-3deg); }
        50% { transform: rotate(3deg); }
      }
      @keyframes slide-up-fade {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      .animate-float { animation: float 4s ease-in-out infinite; }
      .animate-blink { animation: blink 4s infinite; }
      .animate-shadow-pulse { animation: pulse-shadow 4s ease-in-out infinite; }
      .animate-wiggle { animation: wiggle 2s ease-in-out infinite; }
      .animate-slide-up-fade { animation: slide-up-fade 0.6s ease-out forwards; }
      .animate-fade-in { animation: fade-in 0.3s ease-out forwards; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.32.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  </body>
</html>
